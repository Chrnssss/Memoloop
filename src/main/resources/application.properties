spring.application.name=memoloop

# Embedded H2 database, persisted to ./data/memoloop.mv.db
spring.datasource.url=jdbc:h2:file:./data/memoloop;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# H2 web console at http://localhost:8080/h2-console (JDBC URL: same as above)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
